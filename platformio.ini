# PlatformIO Configuration for T-Beam LoRa Triangulation System
# ESP32 T-Beam with LoRa 433MHz + GPS + OLED Display

[env:t-beam]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800

# Upload method (USB - auto-detect COM port)
upload_protocol = esptool

# Build flags
build_flags = 
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

# Library dependencies
lib_deps =
    jgromes/RadioLib @ ^6.0.0
    mikalhart/TinyGPS++ @ ^1.0.3
    olikraus/U8g2 @ ^2.33.15
    bblanchon/ArduinoJson @ ^6.19.0
    me-no-dev/AsyncTCP @ ^1.1.1
    me-no-dev/ESP Async WebServer @ ^1.2.3

# Serial port (auto-detect)
monitor_port = socket://localhost:3333

# Partition scheme for larger sketch + SPIFFS
board_build.partitions = default.csv

# Optional: Enable PSRAM (helpful for large buffers)
board_upload.flash_mode = dio
board_upload.flash_freq = 80m
board_upload.flash_size = 4MB

[env:debug]
extends = env:t-beam
build_type = debug
build_flags = 
    ${env:t-beam.build_flags}
    -DDEBUG=1